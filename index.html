<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fértil — In Craft We Trust</title>
  <meta name="description" content="Fértil es una productora especializada en la creación de piezas de alta gama para marcas, agencias y estudios de todo el mundo.">
  <link rel="stylesheet" href="CSS/style.css">
</head>
<body>

  <!-- Preloader: animación del logo, se reproduce una vez por sesión de navegación -->
  <div class="preloader" data-preloader>
    <video autoplay muted playsinline aria-hidden="true">
      <source src="recursos/videos/logo-intro.webm" type="video/webm">
      <source src="recursos/videos/logo-intro.mp4" type="video/mp4">
    </video>
  </div>

  <!-- Nav: en Inicio se queda como barra fija de ancho completo (sin comportamiento de isla flotante, es pantalla única) -->
  <header class="nav" data-nav>
    <a class="nav__brand" href="index.html">In Craft We Trust</a>

    <nav class="nav__links" aria-label="Navegación principal">
      <a href="pages/directors.html">Directors</a>
      <a href="pages/press.html">Press</a>
      <a href="pages/about.html">About</a>
      <a href="pages/contact.html">Contact</a>
    </nav>

    <button class="nav__toggle" data-nav-toggle aria-label="Abrir menú" aria-expanded="false" aria-controls="mobile-menu">
      <span></span><span></span>
    </button>
  </header>

  <!-- Menú mobile: overlay que se despliega al tocar el botón hamburguesa -->
  <div class="nav__menu-overlay" id="mobile-menu" data-nav-overlay data-open="false">
    <ul>
      <li><a href="pages/directors.html">Directors</a></li>
      <li><a href="pages/press.html">Press</a></li>
      <li><a href="pages/about.html">About</a></li>
      <li><a href="pages/contact.html">Contact</a></li>
    </ul>
  </div>

  <main>
    <section class="hero">
      <video
        class="hero__video"
        data-hero-video
        data-desktop-webm="recursos/videos/hero-desktop.webm"
        data-desktop-mp4="recursos/videos/hero-desktop.mp4"
        data-mobile-webm="recursos/videos/hero-mobile.webm"
        data-mobile-mp4="recursos/videos/hero-mobile.mp4"
        data-poster-desktop="recursos/img/poster-desktop.jpg"
        data-poster-mobile="recursos/img/poster-mobile.jpg"
        poster="recursos/img/poster-desktop.jpg"
        muted
        loop
        playsinline
      ></video>

      <div class="hero__scrim" aria-hidden="true"></div>

      <div class="hero__footer">
        <div class="social-row">
          <a href="https://www.instagram.com/fertil.tv/" target="_blank" rel="noopener" aria-label="Instagram de Fértil">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" aria-hidden="true">
              <rect x="3" y="3" width="18" height="18" rx="5"/>
              <circle cx="12" cy="12" r="4"/>
              <circle cx="17.3" cy="6.7" r="1" fill="currentColor" stroke="none"/>
            </svg>
          </a>
          <a href="https://www.linkedin.com/company/fertil/" target="_blank" rel="noopener" aria-label="LinkedIn de Fértil">
            <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
              <path d="M4.98 3.5C4.98 4.88 3.87 6 2.5 6S0 4.88 0 3.5 1.11 1 2.48 1 4.98 2.12 4.98 3.5zM.5 8h4V23h-4V8zM8 8h3.8v2.05h.05c.53-1 1.83-2.05 3.77-2.05 4.03 0 4.78 2.65 4.78 6.1V23h-4v-6.9c0-1.65-.03-3.77-2.3-3.77-2.3 0-2.65 1.8-2.65 3.65V23H8V8z"/>
            </svg>
          </a>
        </div>

        <!-- TODO: reemplazar por el ícono/isotipo real exportado de FERTIL WEB (PNGS/ILUSTRACIONES) -->
        <img class="brand-mark" src="recursos/img/mark-placeholder.svg" alt="" aria-hidden="true">
      </div>
    </section>
  </main>

  <script src="JS/main.js"></script>
</body>
</html>
