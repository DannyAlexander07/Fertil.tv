  <!-- Evita el "flash" mostaza al recargar la página estando en un director
       (ej. directors.html#santi-chavez): directors.js recién decide qué
       vista mostrar DESPUÉS de que termine su fetch() a directors.json, que
       es asíncrono aunque sea rapidísimo -- en ese intervalo el navegador ya
       pintó el estado por defecto del HTML (listado / fondo mostaza). Este
       script corre en línea, de forma síncrona, apenas el parser llega
       acá (antes de directors.js) y ya deja la sección correcta visible
       usando solo el hash de la URL, sin esperar ningún dato. -->
  <script>
    (function () {
      var slug = window.location.hash.replace("#", "");
      if (!slug) return;
      var list = document.querySelector("[data-directors-list]");
      var detail = document.querySelector("[data-director-detail]");
      if (list) list.hidden = true;
      if (detail) detail.hidden = false;
    })();
  </script>
